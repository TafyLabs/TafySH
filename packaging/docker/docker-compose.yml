version: '3.8'

services:
  # Main TafySH service
  tafysh:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile
    image: tafysh:latest
    container_name: tafysh
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAFYSH_CONFIG_DIR=/home/tafysh/.config/tafysh
    volumes:
      - tafysh-config:/home/tafysh/.config/tafysh
      - tafysh-history:/home/tafysh/.local/share/tafysh

  # Alpine minimal image
  tafysh-alpine:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.alpine
    image: tafysh:alpine
    container_name: tafysh-alpine
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - tafysh-config:/home/tafysh/.config/tafysh

  # Development image
  tafysh-dev:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile.dev
    image: tafysh:dev
    container_name: tafysh-dev
    stdin_open: true
    tty: true
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ../..:/app
      - dev-pip-cache:/root/.cache/pip

  # Ollama companion service for local LLMs
  ollama:
    image: ollama/ollama:latest
    container_name: tafysh-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # TafySH with Ollama (local LLM)
  tafysh-local:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile
    image: tafysh:latest
    container_name: tafysh-local
    stdin_open: true
    tty: true
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TAFYSH_PROVIDER=ollama
      - TAFYSH_MODEL=llama3.2
    depends_on:
      - ollama
    volumes:
      - tafysh-config:/home/tafysh/.config/tafysh

volumes:
  tafysh-config:
  tafysh-history:
  ollama-models:
  dev-pip-cache:
