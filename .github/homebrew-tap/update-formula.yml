# This workflow should be placed in the homebrew-tap repository
# Path: tafysh/homebrew-tap/.github/workflows/update-formula.yml
#
# The tap repository structure should be:
# homebrew-tap/
# ├── .github/workflows/update-formula.yml  (this file)
# ├── Formula/tafysh.rb
# └── README.md

name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          URL="${{ github.event.client_payload.url }}"

          # Update the formula file
          cat > Formula/tafysh.rb << 'FORMULA_EOF'
          # frozen_string_literal: true

          class Tafysh < Formula
            include Language::Python::Virtualenv

            desc "AI-enhanced terminal shell with natural language command generation"
            homepage "https://github.com/tafysh/tafysh"
            url "${URL}"
            sha256 "${SHA256}"
            license "MIT"
            head "https://github.com/tafysh/tafysh.git", branch: "main"

            depends_on "python@3.11"

            def install
              virtualenv_install_with_resources
            end

            def caveats
              <<~EOS
                TafySH has been installed!

                To start: tafysh
                To configure: tafysh config init

                To set as default shell:
                  echo '#{HOMEBREW_PREFIX}/bin/tafysh' | sudo tee -a /etc/shells
                  chsh -s #{HOMEBREW_PREFIX}/bin/tafysh
              EOS
            end

            test do
              assert_match "tafysh", shell_output("#{bin}/tafysh --version")
            end
          end
          FORMULA_EOF

          # Replace placeholders
          sed -i "s|\${URL}|${URL}|g" Formula/tafysh.rb
          sed -i "s|\${SHA256}|${SHA256}|g" Formula/tafysh.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tafysh.rb
          git commit -m "Update tafysh to ${{ github.event.client_payload.version }}"
          git push
